<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔️ EMOJI WAR — BATTLE ROYALE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#06001A;color:#fff;
  font-family:'Rajdhani',sans-serif;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
#root{
  position:relative;width:100%;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  background:
    radial-gradient(ellipse 140% 90% at 30% 10%,rgba(100,0,220,.22) 0%,transparent 50%),
    radial-gradient(ellipse 120% 80% at 70% 80%,rgba(0,160,255,.16) 0%,transparent 50%),
    radial-gradient(ellipse 60% 60% at 50% 50%,rgba(220,0,140,.07) 0%,transparent 60%),
    #06001A;
}
#top{display:flex;align-items:flex-start;gap:7px;padding:7px 7px 4px;flex-shrink:0;height:152px;position:relative;z-index:10;}
#cam{position:relative;width:47%;height:100%;border-radius:8px;overflow:hidden;border:1.5px solid rgba(180,80,255,.25);background:rgba(7,2,20,.9);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
#ad-slot{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.12);font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:2px;text-align:center;}
#ad-slot::before{content:'📹';display:block;font-size:1.8rem;margin-bottom:4px;opacity:.15}
.live-badge{position:absolute;top:6px;left:6px;background:#E50000;color:#fff;font-family:'Orbitron',monospace;font-size:.44rem;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;display:flex;align-items:center;gap:3px;animation:liveBlink 1.4s ease-in-out infinite;z-index:2;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;flex-shrink:0;animation:liveBlink .7s ease-in-out infinite alternate;}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:.45}}
.cam-label{position:absolute;bottom:5px;left:7px;font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:1px;color:rgba(255,255,255,.4);}
#winners{flex:1;height:100%;border-radius:8px;background:rgba(8,0,28,.88);border:1px solid rgba(180,80,255,.2);padding:7px 8px;display:flex;flex-direction:column;gap:3px;overflow:hidden;}
.win-ttl{font-family:'Orbitron',monospace;font-size:.56rem;letter-spacing:2px;color:#C080FF;text-align:center;border-bottom:1px solid rgba(180,80,255,.15);padding-bottom:4px;margin-bottom:2px;}
.win-row{display:flex;align-items:center;gap:5px;padding:1px 0}
.win-rk{font-family:'Orbitron',monospace;font-size:.54rem;color:rgba(255,255,255,.35);width:12px}
.win-em{font-size:1.05rem;line-height:1}
.win-nm{flex:1;font-weight:700;font-size:.62rem;color:#E0C0FF;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-ct{font-family:'Orbitron',monospace;font-size:.54rem;color:#FFD700;white-space:nowrap}
#leader{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:3px 10px;background:rgba(0,0,0,.4);border-top:1px solid rgba(180,80,255,.1);border-bottom:1px solid rgba(180,80,255,.1);position:relative;z-index:10;}
.ldot{width:7px;height:7px;border-radius:50%;background:#00FF88;box-shadow:0 0 6px #00FF88;animation:ldotA .8s ease-in-out infinite alternate;flex-shrink:0;}
@keyframes ldotA{from{opacity:.3}to{opacity:1}}
#l-em{font-size:1.05rem;flex-shrink:0}
#l-nm{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:1px;color:#FFD700;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
#l-vt{margin-left:auto;font-family:'Orbitron',monospace;font-size:.54rem;color:rgba(255,255,255,.4);flex-shrink:0;}
.yt-st{font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:1px;padding:2px 7px;border-radius:3px;transition:all .3s;flex-shrink:0;}
.yt-st.on{color:#00FF88;border:1px solid rgba(0,255,136,.3);background:rgba(0,255,136,.07)}
.yt-st.off{color:#FF2D78;border:1px solid rgba(255,45,120,.3);background:rgba(255,45,120,.07)}
.yt-st.wait{color:#FFD700;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.07);animation:liveBlink .8s ease-in-out infinite alternate}
#arena-outer{flex:1 1 0;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;position:relative;z-index:1;}
#arena-wrap{position:relative;flex-shrink:0;}
#arena-ring{position:absolute;inset:0;border-radius:50%;border:2.5px dashed rgba(180,80,255,.45);animation:ringRot 35s linear infinite;pointer-events:none;z-index:2;box-shadow:0 0 20px rgba(150,60,255,.1),inset 0 0 20px rgba(100,0,255,.06);}
@keyframes ringRot{to{transform:rotate(360deg)}}
#arena-ring2{position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(180,80,255,.12);pointer-events:none;z-index:2;}
#arena-bg{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 44%,rgba(80,0,180,.1) 0%,rgba(40,0,120,.05) 40%,rgba(6,0,26,.98) 68%);pointer-events:none;}
/* PERF: transform ishlatiladi — GPU accelerated */
.snode{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;z-index:5;
  will-change:transform;
}
.s-ball{position:relative;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.18) 0%,rgba(255,255,255,.04) 45%,rgba(0,0,0,.25) 100%);box-shadow:0 3px 10px rgba(0,0,0,.65),inset 0 1px 2px rgba(255,255,255,.18);transition:box-shadow .15s ease;}
.s-em{font-size:clamp(1.1rem,2.6vw,1.75rem);line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.55));}
.s-vt{font-family:'Orbitron',monospace;font-size:clamp(.3rem,.65vw,.48rem);color:#FFD700;font-weight:700;line-height:1;margin-top:1px;text-shadow:0 1px 3px rgba(0,0,0,.9);}
.snode.leader .s-ball{box-shadow:0 0 0 2px rgba(255,215,0,.6),0 0 16px rgba(255,215,0,.5),0 3px 10px rgba(0,0,0,.65);}
.snode.leader .s-vt{color:gold}
.snode.danger .s-ball{box-shadow:0 0 0 1.5px rgba(255,80,80,.4),0 0 10px rgba(255,40,40,.2),0 3px 10px rgba(0,0,0,.65);animation:dangerFade .5s ease-in-out infinite alternate;}
@keyframes dangerFade{from{opacity:.6}to{opacity:1}}
.snode.danger .s-vt{color:#FF6060}
.snode.hit .s-ball{animation:hitF .12s ease-out}
@keyframes hitF{0%{box-shadow:0 0 0 4px rgba(255,255,255,.9),0 0 24px rgba(255,255,255,.6)}100%{box-shadow:0 3px 10px rgba(0,0,0,.65)}}
.snode.out{animation:elimA .85s ease-in forwards !important;z-index:4;pointer-events:none;}
@keyframes elimA{
  0%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}
  12%{transform:translate(-50%,-50%) scale(1.5) rotate(-8deg);opacity:1}
  100%{transform:translate(-50%,350px) scale(.01) rotate(32deg);opacity:0}
}
.vburst{position:absolute;pointer-events:none;z-index:20;font-family:'Orbitron',monospace;font-size:.68rem;color:#00FF88;text-shadow:0 0 8px #00FF88;animation:vbA .72s ease-out forwards;white-space:nowrap;}
@keyframes vbA{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1}100%{transform:translate(-50%,-185%) scale(.3);opacity:0}}
.joinfx{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;font-family:'Orbitron',monospace;font-size:.95rem;color:#FFD700;text-shadow:0 0 22px #FFD700;animation:joinA .9s ease-out forwards;text-align:center;white-space:nowrap;}
@keyframes joinA{0%{transform:translate(-50%,-50%) scale(.18) rotate(-14deg);opacity:1}55%{transform:translate(-50%,-50%) scale(1.15) rotate(1deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:0}}
#round-bar{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(0,0,0,.5);border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:10;}
.rb{font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;white-space:nowrap;}
.rb-rnd{color:#FFD700;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22)}
.rb-phase{color:#FF00CC;background:rgba(255,0,200,.07);border:1px solid rgba(255,0,200,.25);animation:fG .9s ease-in-out infinite alternate;}
.rb-phase.brk{color:#00CFFF;background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.2);animation:none;}
@keyframes fG{from{box-shadow:none}to{box-shadow:0 0 8px rgba(255,0,200,.35)}}
.rb-timer{color:rgba(255,255,255,.5);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.rb-alive{color:#00FF88;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.22);margin-left:auto;}
#elim-sec{flex-shrink:0;padding:4px 8px 5px;background:rgba(0,0,0,.45);border-top:1px solid rgba(255,0,120,.1);position:relative;z-index:10;}
.elim-ttl{font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:2px;color:#FF2D78;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.e-dot{width:5px;height:5px;border-radius:50%;background:#FF2D78;flex-shrink:0}
#elim-scroll{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none;}
#elim-scroll::-webkit-scrollbar{display:none}
.e-item{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.1) 0%,rgba(0,0,0,.4) 100%);border:1px solid rgba(255,45,120,.2);display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:.6;position:relative;}
.e-item::after{content:'✕';position:absolute;font-size:.38rem;color:rgba(255,45,120,.9);bottom:-1px;right:-1px;background:#06001A;border-radius:50%;width:10px;height:10px;line-height:10px;text-align:center;}
#wscreen{display:none;position:fixed;inset:0;background:rgba(6,0,26,.96);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#wscreen.on{display:flex}
.cf-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.cfp{position:absolute;top:-20px;animation:cfF linear forwards}
@keyframes cfF{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.2}}
.w-trophy{font-size:3rem;animation:trS 2s ease-in-out infinite}
@keyframes trS{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.1) rotate(5deg)}}
.w-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.6rem,5vw,2.5rem);letter-spacing:6px;background:linear-gradient(135deg,#C080FF,#FF00CC,#00CFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.w-em{font-size:clamp(4rem,12vw,6rem);animation:wP 1.5s ease-in-out infinite}
@keyframes wP{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.w-nm{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(1.1rem,3.5vw,1.8rem);letter-spacing:4px;color:gold;text-shadow:0 0 30px gold;}
.w-vt{color:rgba(255,255,255,.4);font-size:.82rem;font-weight:700}
.w-cta{font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:2px;color:#C080FF;background:rgba(180,80,255,.08);border:1px solid rgba(180,80,255,.3);padding:6px 16px;border-radius:5px;animation:ctaG 1.5s ease-in-out infinite;text-align:center;}
@keyframes ctaG{0%,100%{box-shadow:none}50%{box-shadow:0 0 18px rgba(180,80,255,.4)}}
.w-next{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:2px;color:rgba(255,255,255,.22)}
#toast{position:fixed;top:8px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(6,0,26,.97);border:1px solid rgba(180,80,255,.5);border-radius:5px;padding:5px 14px;font-weight:700;font-size:.63rem;color:#C080FF;z-index:500;white-space:nowrap;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.56,.64,1);max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#toast.on{transform:translateX(-50%) translateY(0)}
.ms-banner{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(70px);background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,0,200,.1));border:1px solid rgba(255,215,0,.4);border-radius:6px;padding:6px 18px;font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:2px;color:#FFD700;z-index:60;white-space:nowrap;transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.ms-banner.on{transform:translateX(-50%) translateY(0)}
/* PERF: particles limit va contain */
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:999;animation:ptF .6s ease-out forwards;contain:strict;}
@keyframes ptF{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
#hflash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity .08s}
#hflash.on{opacity:1}
#sound-badge{position:fixed;bottom:12px;right:10px;font-family:'Orbitron',monospace;font-size:.44rem;letter-spacing:1px;padding:4px 10px;border-radius:4px;background:rgba(0,200,120,.08);border:1px solid rgba(0,255,136,.3);color:#00FF88;z-index:600;cursor:pointer;animation:sbP 1.6s ease-in-out infinite alternate;user-select:none;}
@keyframes sbP{from{opacity:.5}to{opacity:1}}
</style>
</head>
<body>
<div id="root">
  <div id="top">
    <div id="cam">
      <div id="ad-slot">STREAM CAM</div>

<div id="wscreen">

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   STICKERS & EXTRA
═══════════════════════════════════════════════════════ */
const STICKERS = [
  {e:'😂',n:'LOL'},{e:'😍',n:'Love'},{e:'🔥',n:'Fire'},
  {e:'💀',n:'Skull'},{e:'👻',n:'Ghost'},{e:'🤖',n:'Robot'},
  {e:'👑',n:'King'},{e:'🦁',n:'Lion'},{e:'🐯',n:'Tiger'},
  {e:'🐺',n:'Wolf'},{e:'🦊',n:'Fox'},{e:'🐉',n:'Dragon'},
  {e:'🦄',n:'Unicorn'},{e:'🚀',n:'Rocket'},{e:'💎',n:'Diamond'},
  {e:'⚡',n:'Thunder'},{e:'🌟',n:'Star'},{e:'🎯',n:'Target'},
  {e:'🏆',n:'Trophy'},{e:'🤩',n:'Superstar'}
];
const EXTRA = {
  '😀':'Grin','😎':'Cool','🥳':'Party','🤠':'Cowboy','🎃':'Pumpkin',
  '🐱':'Cat','🐶':'Dog','🐸':'Frog','🐻':'Bear','👽':'Alien',
  '🎮':'Gamer','💪':'Strong','🍕':'Pizza','🌈':'Rainbow','🦋':'Butterfly',
  '❤️':'Heart','💯':'100','🎵':'Music','😱':'Shock','🤯':'Mindblown',
  '🦈':'Shark','🦅':'Eagle','🐊':'Croc','🦂':'Scorpion','🕷️':'Spider',
  '⚔️':'Sword','🛡️':'Shield','💣':'Bomb','🌪️':'Tornado','☄️':'Meteor',
};

/* ═══════════════════════════════════════════════════════
   GAME CONFIG
═══════════════════════════════════════════════════════ */
const ROUND_S    = 60;
const WIN_AUTO   = 5;
const MAX_ARENA  = 20;
const BASE_SPEED = 1.4;
const BALL_R     = 22;
const MAX_PARTICLES = 80; // PERF: particle cheklovi

/* ═══════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════ */
let fighters   = [];
let eliminated = [];
let allWinners = [];
let gameNum    = 0;
let phase      = 'idle';
let roundLeft  = ROUND_S;
let winLeft    = WIN_AUTO;
let _elimAcc   = 0;
let _tick      = null;
let _raf       = null;
let aR = 0, CX = 0, CY = 0;
let _fq        = {};
let _totalVotes = 0;
let _fid       = 0;
const MS_LVLS  = [10, 25, 50, 100, 200, 500];
let _msIdx     = 0;

/* PERF: DOM cache — har safar getElementById chaqirilmaydi */
const DOM = {};
function initDOMCache() {
  DOM.arenaWrap  = document.getElementById('arena-wrap');
  DOM.elimScroll = document.getElementById('elim-scroll');
  DOM.tRound     = document.getElementById('t-round');
  DOM.tTimer     = document.getElementById('t-timer');
  DOM.tPhase     = document.getElementById('t-phase');
  DOM.tAlive     = document.getElementById('t-alive');
  DOM.lEm        = document.getElementById('l-em');
  DOM.lNm        = document.getElementById('l-nm');
  DOM.lVt        = document.getElementById('l-vt');
  DOM.wScreen    = document.getElementById('wscreen');
  DOM.wEm        = document.getElementById('w-em');
  DOM.wNm        = document.getElementById('w-nm');
  DOM.wVt        = document.getElementById('w-vt');
  DOM.wNext      = document.getElementById('w-next');
  DOM.winList    = document.getElementById('winners-list');
  DOM.cf         = document.getElementById('cf');
  DOM.toast      = document.getElementById('toast');
  DOM.ms         = document.getElementById('ms');
  DOM.ytBadge    = document.getElementById('yt-badge');
}

/* PERF: node cache — fighters uchun DOM referenslari */
const nodeCache = new Map();

/* PERF: cached ball size */
let _cachedBS = 0;
function ballSize() {
  if (!_cachedBS) _cachedBS = Math.max(26, Math.min(42, aR * .13));
  return _cachedBS;
}

/* PERF: vote queue — bir vaqtda kelgan ovozlar batched */
const voteQueue = [];
let voteProcessing = false;
function processVoteQueue() {
  if (voteProcessing || !voteQueue.length) return;
  voteProcessing = true;
  // Har frameda max 5 ta vote qayta ishlash — junk to'planmaydi
  const batch = voteQueue.splice(0, 5);
  batch.forEach(raw => _processVote(raw));
  voteProcessing = false;
  if (voteQueue.length) requestAnimationFrame(processVoteQueue);
}

/* PERF: refreshNodes throttle — har 500ms da bir marta */
let _refreshT = 0;
function maybeRefreshNodes(alive) {
  const now = Date.now();
  if (now - _refreshT < 500) return;
  _refreshT = now;
  refreshNodes(alive);
}

/* ═══════════════════════════════════════════════════════
   EMOJI UTILS
═══════════════════════════════════════════════════════ */
const _seg = (typeof Intl !== 'undefined' && Intl.Segmenter)
  ? new Intl.Segmenter([], {granularity:'grapheme'}) : null;
function graphemes(s) {
  return _seg ? [..._seg.segment(s)].map(x => x.segment) : [...s];
}
function norm(s) {
  return (s||'').replace(/\uFE0F/g,'').replace(/\u20E3/g,'').trim();
}
function firstEmoji(s) {
  for (const g of graphemes(s)) {
    const cp = g.codePointAt(0);
    if (!cp || cp <= 127) continue;
    if (cp>=0x2300||(cp>=0x1F000&&cp<=0x1FFFF)||(cp>=0x2600&&cp<=0x27BF)||(cp>=0x2B00&&cp<=0x2BFF)) return g;
  }
  return null;
}
function emojiName(e) {
  const f = STICKERS.find(x => norm(x.e)===norm(e));
  if (f) return f.n;
  return EXTRA[e]||EXTRA[norm(e)]||'Fighter';
}

/* ═══════════════════════════════════════════════════════
   ARENA SIZE
═══════════════════════════════════════════════════════ */
function sizeArena() {
  const o = document.getElementById('arena-outer');
  const w = DOM.arenaWrap || document.getElementById('arena-wrap');
  const r = o.getBoundingClientRect();
  const s = Math.min(r.width, r.height) - 4;
  w.style.width  = s + 'px';
  w.style.height = s + 'px';
  aR = s / 2 - 8;
  CX = s / 2;
  CY = s / 2;
  _cachedBS = 0; // Reset cache on resize
}

/* ═══════════════════════════════════════════════════════
   ELIM INTERVAL
═══════════════════════════════════════════════════════ */
function calcInterval() {
  const aliveCount = fighters.filter(f => f.alive).length;
  if (aliveCount <= 1) return 999;
  return Math.max(1, roundLeft + 1) / (aliveCount - 1);
}

/* ═══════════════════════════════════════════════════════
   INIT GAME
═══════════════════════════════════════════════════════ */
function initGame() {
  sizeArena();
  fighters    = [];
  eliminated  = [];
  _fid        = 0;
  _totalVotes = 0;
  _msIdx      = 0;
  _fq         = {};
  _elimAcc    = 0;
  roundLeft   = ROUND_S;
  gameNum++;
  phase       = 'game';
  nodeCache.clear();

  const chosen = [...STICKERS].sort(() => Math.random() - .5);
  chosen.forEach((s, i) => {
    const ang = (i / chosen.length) * Math.PI * 2 + (Math.random() - .5) * .22;
    const r   = aR * (0.18 + (i % 4) * 0.14 + Math.random() * .08);
    const dir = Math.random() * Math.PI * 2;
    const spd = BASE_SPEED * (0.85 + Math.random() * .3);
    fighters.push({
      id: `f${_fid++}`, e: s.e, n: s.n,
      votes: 0, alive: true,
      x: CX + r * Math.cos(ang), y: CY + r * Math.sin(ang),
      vx: Math.cos(dir) * spd,   vy: Math.sin(dir) * spd,
    });
  });

  DOM.tRound.textContent = `ROUND ${gameNum}`;
  DOM.tTimer.textContent = '1:00';
  setPhase('game');
  document.querySelectorAll('.snode,.vburst,.joinfx').forEach(e => e.remove());
  DOM.elimScroll.innerHTML = '';

  fighters.forEach(mkNode);
  updAlive();
  updLeader();

  clearInterval(_tick);
  _tick = setInterval(tick, 1000);
  cancelAnimationFrame(_raf);
  loop();
  if (audioReady) startBgMusic();
}

/* ═══════════════════════════════════════════════════════
   NODE — PERF: transform + cached ref
═══════════════════════════════════════════════════════ */
function mkNode(f) {
  const bs  = ballSize();
  const el  = document.createElement('div');
  el.className = 'snode';
  el.id        = `n-${f.id}`;
  el.innerHTML = `<div class="s-ball" style="width:${bs}px;height:${bs}px"><span class="s-em">${f.e}</span></div><span class="s-vt">—</span>`;
  // PERF: GPU accelerated transform yerine left/top
  el.style.left = '0px';
  el.style.top  = '0px';
  el.style.transform = `translate(calc(${f.x}px - 50%), calc(${f.y}px - 50%))`;
  DOM.arenaWrap.appendChild(el);
  nodeCache.set(f.id, { el, vtEl: el.querySelector('.s-vt') });
}

/* ═══════════════════════════════════════════════════════
   PHYSICS LOOP — PERF: transform, maybeRefreshNodes
═══════════════════════════════════════════════════════ */
function loop() {
  if (phase === 'game') {
    const alive = fighters.filter(f => f.alive);
    const bs    = ballSize();
    const R     = bs / 2 + 2;
    const md    = R * 2;

    // Harakat + devor
    for (const f of alive) {
      f.x += f.vx; f.y += f.vy;
      const dx = f.x - CX, dy = f.y - CY;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d + R > aR) {
        const nx = dx/d, ny = dy/d;
        const dot = f.vx*nx + f.vy*ny;
        if (dot > 0) { f.vx -= 2*dot*nx; f.vy -= 2*dot*ny; }
        const ov = d + R - aR;
        f.x -= nx*ov; f.y -= ny*ov;
      }
    }

    // Kolliziya
    for (let i = 0; i < alive.length; i++) {
      for (let j = i+1; j < alive.length; j++) {
        const a = alive[i], b = alive[j];
        const dx = b.x-a.x, dy = b.y-a.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < md*md && d2 > .01) {
          const d  = Math.sqrt(d2);
          const nx = dx/d, ny = dy/d;
          const p  = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
          if (p > 0) {
            a.vx -= p*nx; a.vy -= p*ny;
            b.vx += p*nx; b.vy += p*ny;
            flashHit(a.id); flashHit(b.id);
          }
          const ov = (md-d)/2;
          a.x -= nx*ov; a.y -= ny*ov;
          b.x += nx*ov; b.y += ny*ov;
        }
      }
    }

    // Tezlik + DOM update — PERF: transform ishlatiladi
    for (const f of alive) {
      const sp = Math.sqrt(f.vx*f.vx + f.vy*f.vy);
      if (sp < BASE_SPEED*.42) { const sc=(BASE_SPEED*.62)/(sp||.001); f.vx*=sc; f.vy*=sc; }
      if (sp > BASE_SPEED*3)   { const sc=(BASE_SPEED*2.5)/sp; f.vx*=sc; f.vy*=sc; }
      const cached = nodeCache.get(f.id);
      if (cached && !cached.el.classList.contains('out')) {
        cached.el.style.transform = `translate(calc(${f.x}px - 50%), calc(${f.y}px - 50%))`;
      }
    }

    // PERF: throttled refresh
    maybeRefreshNodes(alive);
  }
  if (phase !== 'idle') _raf = requestAnimationFrame(loop);
}

function flashHit(id) {
  if (_fq[id]) return;
  _fq[id] = true;
  const cached = nodeCache.get(id);
  if (cached) {
    cached.el.classList.add('hit');
    setTimeout(() => { cached.el.classList.remove('hit'); delete _fq[id]; }, 112);
  }
}

/* PERF: cached node refs */
function refreshNodes(alive) {
  if (!alive.length) return;
  let maxV = 0, minV = Infinity;
  for (const f of alive) {
    if (f.votes > maxV) maxV = f.votes;
    if (f.votes < minV) minV = f.votes;
  }
  for (const f of alive) {
    const cached = nodeCache.get(f.id);
    if (!cached || cached.el.classList.contains('out')) continue;
    cached.el.classList.toggle('leader', f.votes === maxV && f.votes > 0);
    cached.el.classList.toggle('danger', f.votes === minV && alive.length > 1);
    cached.vtEl.textContent = f.votes > 0 ? `${f.votes}▲` : '—';
  }
}

/* ═══════════════════════════════════════════════════════
   TICK
═══════════════════════════════════════════════════════ */
function tick() {
  if (phase === 'game') {
    roundLeft--;
    const safe = Math.max(0, roundLeft);
    const m = Math.floor(safe/60), s = safe%60;
    DOM.tTimer.textContent = `${m}:${s<10?'0'+s:s}`;

    if (roundLeft > 0 && roundLeft <= 5) sfx('warn');

    _elimAcc += 1;
    const interval = calcInterval();
    if (_elimAcc >= interval) {
      _elimAcc -= interval;
      const alive = fighters.filter(f => f.alive);
      if (alive.length > 1) {
        const minV = alive.reduce((a,f) => f.votes < a ? f.votes : a, Infinity);
        const pool = alive.filter(f => f.votes === minV);
        elim(pool[Math.floor(Math.random()*pool.length)]);
      }
    }

    updAlive(); updLeader();

    const alive = fighters.filter(f => f.alive);
    if (roundLeft <= 0 || alive.length <= 1) {
      clearInterval(_tick); _tick = null;
      const winner = alive[0] || fighters.sort((a,b) => b.votes-a.votes)[0];
      if (winner) setTimeout(() => showWin(winner), 800);
    }
  } else if (phase === 'winwait') {
    winLeft--;
    DOM.wNext.textContent = `Next round in ${winLeft}…`;
    if (winLeft <= 0) {
      DOM.wScreen.classList.remove('on');
      DOM.cf.innerHTML = '';
      document.querySelectorAll('.snode,.vburst,.joinfx').forEach(e => e.remove());
      nodeCache.clear();
      initGame();
    }
  }
}

/* ═══════════════════════════════════════════════════════
   ELIM — PERF: cached node
═══════════════════════════════════════════════════════ */
function elim(f) {
  f.alive = false;
  sfx('elim');
  eliminated.push(f);
  // PERF: eliminated ro'yxatini cheklash (memory leak oldini olish)
  if (eliminated.length > 100) eliminated = eliminated.slice(-50);

  const item = document.createElement('div');
  item.className = 'e-item';
  item.title     = f.n;
  item.textContent = f.e;
  DOM.elimScroll.appendChild(item);
  setTimeout(() => { DOM.elimScroll.scrollLeft = DOM.elimScroll.scrollWidth; }, 50);

  const cached = nodeCache.get(f.id);
  if (cached) {
    spawnPts(cached.el);
    cached.el.classList.add('out');
    setTimeout(() => {
      cached.el.remove();
      nodeCache.delete(f.id);
    }, 900);
  }

  toast(`💥 ${f.e} ${f.n} eliminated!`);
  updAlive();
}

/* ═══════════════════════════════════════════════════════
   WIN
═══════════════════════════════════════════════════════ */
function showWin(f) {
  if (!f) return;
  cancelAnimationFrame(_raf); _raf = null;
  sfx('win');
  allWinners.unshift({e:f.e, n:f.n, votes:f.votes});
  if (allWinners.length > 3) allWinners = allWinners.slice(0,3);
  updWinners();
  DOM.wEm.textContent  = f.e;
  DOM.wNm.textContent  = f.n.toUpperCase();
  DOM.wVt.textContent  = `${f.votes} votes — CHAMPION!`;
  winLeft = WIN_AUTO;
  DOM.wNext.textContent = `Next round in ${winLeft}…`;
  DOM.wScreen.classList.add('on');
  spawnConfetti();
  phase = 'winwait';
  clearInterval(_tick);
  _tick = setInterval(tick, 1000);
}

function updWinners() {
  if (!allWinners.length) return;
  const medals = ['🥇','🥈','🥉'];
  DOM.winList.innerHTML = allWinners.map((w,i) => `
    <div class="win-row">
      <span class="win-rk">${medals[i]||i+1}</span>
      <span class="win-em">${w.e}</span>
      <span class="win-nm">${w.n}</span>
      <span class="win-ct">${w.votes}V</span>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════════
   VOTE — PERF: queue bilan
═══════════════════════════════════════════════════════ */
function vote(raw) {
  if (phase !== 'game') return;
  if (!raw || !raw.trim()) return;
  voteQueue.push(raw.trim());
  requestAnimationFrame(processVoteQueue);
}

function _processVote(raw) {
  if (phase !== 'game') return;
  const emoji = firstEmoji(raw);
  if (!emoji) return;

  _totalVotes++;
  const match = findF(emoji, true);

  if (match) {
    match.votes++;
    sfx('vote');
    voteBurst(match);
    toast(`${match.e} +1 (${match.votes} votes)`);
  } else {
    const dead = findF(emoji, false);
    if (dead) { toast(`❌ ${dead.e} eliminated!`); return; }
    if (fighters.filter(f=>f.alive).length < MAX_ARENA) {
      const nf = addFighter(emoji);
      if (nf) { nf.votes++; toast(`🆕 ${emoji} ${nf.n} ENTERED!`); }
    } else {
      toast('⚠️ Arena full!');
    }
  }
  checkMs(); updLeader();
}

function findF(emoji, aliveOnly) {
  const pool = aliveOnly ? fighters.filter(f=>f.alive) : fighters;
  const n = norm(emoji);
  return pool.find(f => norm(f.e)===n || f.e===emoji) || null;
}

function addFighter(emoji) {
  if (fighters.filter(f=>f.alive).length >= MAX_ARENA) return null;
  if (findF(emoji, false)) return null;
  const id  = `f${_fid++}`;
  const name = emojiName(emoji);
  const ang  = Math.random()*Math.PI*2;
  const r    = aR*(0.2+Math.random()*.45);
  const dir  = Math.random()*Math.PI*2;
  const spd  = BASE_SPEED*(0.85+Math.random()*.3);
  const f = { id, e:emoji, n:name, votes:0, alive:true,
    x:CX+r*Math.cos(ang), y:CY+r*Math.sin(ang),
    vx:Math.cos(dir)*spd, vy:Math.sin(dir)*spd };
  fighters.push(f);
  mkNode(f);
  sfx('join');
  const b = document.createElement('div');
  b.className   = 'joinfx';
  b.textContent = `${emoji} ${name.toUpperCase()} ENTERED!`;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 1000);
  updAlive();
  return f;
}

/* ═══════════════════════════════════════════════════════
   UI — PERF: cached DOM refs
═══════════════════════════════════════════════════════ */
function updAlive() {
  DOM.tAlive.textContent = `🟢 ${fighters.filter(f=>f.alive).length}`;
}
function updLeader() {
  let top = null;
  for (const f of fighters) {
    if (!f.alive) continue;
    if (!top || f.votes > top.votes) top = f;
  }
  if (top && top.votes > 0) {
    DOM.lEm.textContent = top.e;
    DOM.lNm.textContent = top.n.toUpperCase();
    DOM.lVt.textContent = `${top.votes} votes`;
  } else {
    DOM.lEm.textContent = '—';
    DOM.lNm.textContent = 'WAITING...';
    DOM.lVt.textContent = '0 votes';
  }
}
function setPhase(p) {
  if (p==='game') { DOM.tPhase.textContent='⚔ BATTLE'; DOM.tPhase.className='rb rb-phase'; }
  else            { DOM.tPhase.textContent='⏸ BREAK';  DOM.tPhase.className='rb rb-phase brk'; }
}

/* ═══════════════════════════════════════════════════════
   SOCKET
═══════════════════════════════════════════════════════ */
function connectSocket() {
  const badge = DOM.ytBadge;
  if (typeof io === 'undefined') {
    badge.textContent = '⚠️ NO SERVER'; badge.className = 'yt-st off'; return;
  }
  const socket = io({
    transports: ['websocket','polling'],
    reconnection: true,
    reconnectionDelay: 2000,
    reconnectionAttempts: Infinity,
  });
  socket.on('connect',    () => { badge.textContent='🟢 YT LIVE';     badge.className='yt-st on'; });
  socket.on('disconnect', () => { badge.textContent='🔄 RECONNECTING'; badge.className='yt-st wait'; });
  socket.on('yt_status', data => {
    const s = data.status;
    if      (s==='CONNECTED')    { badge.textContent='🟢 YT LIVE';   badge.className='yt-st on';   toast('✅ YouTube connected!'); }
    else if (s==='CONNECTING')   { badge.textContent='🔄 CONNECTING'; badge.className='yt-st wait'; }
    else if (s==='ERROR')        { badge.textContent='⚠️ ERROR';       badge.className='yt-st off'; }
    else if (s==='NOT_LIVE')     { badge.textContent='⏸ NOT LIVE';    badge.className='yt-st off'; }
    else if (s==='STREAM_ENDED') { badge.textContent='🏁 ENDED';       badge.className='yt-st off'; }
  });
  ['vote','chat','comment','message','liveChat'].forEach(ev => {
    socket.on(ev, data => {
      const raw = data.emojiId||data.emoji||data.text||data.message||data.comment||data.displayMessage||'';
      if (raw) vote(raw);
    });
  });
}

/* ═══════════════════════════════════════════════════════
   AUDIO — PERF: drift-free scheduler
═══════════════════════════════════════════════════════ */
let AC = null, audioReady = false;
let _bgGain = null, _bgLoopId = null, _bgT0 = 0;

function initAudio() {
  if (audioReady) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state==='suspended') AC.resume();
    audioReady = true;
    const sb = document.getElementById('sound-badge');
    if (sb) { sb.textContent='🔊 SOUND ON'; setTimeout(()=>sb.remove(),1800); }
    startBgMusic();
  } catch(e) { console.warn('Audio:', e); }
}

function mkBus(vol) {
  const g = AC.createGain(); g.gain.value = vol;
  const c = AC.createDynamicsCompressor();
  c.threshold.value=-6; c.knee.value=4; c.ratio.value=8;
  c.attack.value=0.002; c.release.value=0.12;
  g.connect(c); c.connect(AC.destination);
  return g;
}

function O(freq,dur,type,vol,t,dest,freqEnd) {
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
    if (freqEnd!=null) o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur*.85);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.006);
    g.gain.setValueAtTime(vol*.78,t+dur*.55);
    g.gain.linearRampToValueAtTime(0,t+dur*.94);
    o.connect(g); g.connect(dest);
    o.start(t); o.stop(t+dur+0.01);
  } catch(e) {}
}

function N(dur,vol,t,dest,hpf) {
  try {
    const len=Math.ceil(AC.sampleRate*Math.max(dur,0.01));
    const buf=AC.createBuffer(1,len,AC.sampleRate);
    const d=buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=AC.createBufferSource(), g=AC.createGain();
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur*.92);
    src.buffer=buf;
    if (hpf) { const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=hpf; src.connect(f); f.connect(g); }
    else src.connect(g);
    g.connect(dest); src.start(t);
  } catch(e) {}
}

function KICK(t,dest,vol) {
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(170,t);
    o.frequency.exponentialRampToValueAtTime(38,t+0.09);
    g.gain.setValueAtTime(vol||0.55,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.15);
    N(0.015,(vol||0.55)*.5,t,dest);
  } catch(e) {}
}

function SNARE(t,dest,vol) { N(0.13,vol||0.22,t,dest,1800); O(220,0.08,'triangle',(vol||0.22)*.55,t,dest); }
function OHAT(t,dest,vol)  { N(0.09,vol||0.07,t,dest,7500); }
function CHAT(t,dest,vol)  { N(0.022,vol||0.05,t,dest,9000); }

/* PERF: BGM — drift-free (AudioContext time, not setInterval) */
function startBgMusic() {
  if (_bgLoopId || !AC) return;
  _bgGain = mkBus(0.20);
  const BPM=128, B=60/BPM, E=B/2, S=B/4, BAR=B*4;
  const MEL=[659,2,554,2,494,2,440,2,494,2,554,2,659,2,440,2,740,2,659,2,554,2,494,2,440,4,659,2,554,2,880,4,740,2,659,2,554,2,494,2,440,4,659,2,740,2,659,2,554,2,494,2,440,2,494,2,659,2];
  const CHORDS=[[110,138,165,220],[73,110,147,185],[82,123,165,247],[110,138,165,220]];
  let loopSixteenths=0;
  for (let i=0;i<MEL.length;i+=2) loopSixteenths+=MEL[i+1];
  const loopLen=loopSixteenths*S;
  _bgT0=AC.currentTime+0.05;

  function sched() {
    if (!_bgGain || !AC) return;
    const t0=_bgT0;
    let t=t0;
    for (let i=0;i<MEL.length;i+=2) {
      const f=MEL[i], d=MEL[i+1]*S;
      O(f,d*.86,'square',.10,t,_bgGain);
      O(f*2,d*.80,'sine',.035,t,_bgGain);
      O(f*1.006,d*.86,'square',.03,t,_bgGain);
      t+=d;
    }
    for (let bar=0;bar<4;bar++) {
      const bt=t0+bar*BAR, ch=CHORDS[bar%4];
      KICK(bt,_bgGain,.50); KICK(bt+B*2,_bgGain,.46); KICK(bt+B*2.5,_bgGain,.28);
      SNARE(bt+B,_bgGain,.20); SNARE(bt+B*3,_bgGain,.20);
      OHAT(bt+E,_bgGain,.09); OHAT(bt+E+B,_bgGain,.07);
      OHAT(bt+E+B*2,_bgGain,.09); OHAT(bt+E+B*3,_bgGain,.07);
      for (let h=0;h<16;h++) { if (h%4===2) continue; CHAT(bt+h*S,_bgGain,h%2===0?.05:.03); }
      ch.forEach(f=>{O(f,BAR*.92,'sine',.038,bt,_bgGain);if(f<200)O(f*2,BAR*.85,'triangle',.018,bt,_bgGain);});
      O(ch[0],E*.88,'sine',.30,bt,_bgGain); O(ch[0],E*.88,'triangle',.12,bt,_bgGain);
      O(ch[0],E*.88,'sine',.24,bt+B*2,_bgGain);
    }
    _bgT0+=loopLen;
  }

  sched();
  // PERF: drift-free — AudioContext time asosida rejalashtirish
  function scheduleLoop() {
    if (!_bgGain) return;
    const ahead = _bgT0 - AC.currentTime;
    if (ahead < loopLen * 0.5) { sched(); }
    _bgLoopId = setTimeout(scheduleLoop, 500);
  }
  _bgLoopId = setTimeout(scheduleLoop, (loopLen - 0.05) * 1000);
}

function stopBg() {
  if (_bgLoopId) { clearTimeout(_bgLoopId); _bgLoopId = null; }
  if (_bgGain && AC) {
    try { _bgGain.gain.setTargetAtTime(0, AC.currentTime, 0.18); } catch(e) {}
    _bgGain = null;
  }
}

function sfx(type) {
  if (!AC) return;
  try {
    if (type==='vote') {
      const m=mkBus(0.28), t=AC.currentTime;
      O(1400,.040,'triangle',.65,t,m); O(1800,.030,'sine',.30,t+.01,m); O(2200,.018,'sine',.15,t+.015,m);
    }
    if (type==='elim') {
      const m=mkBus(0.55), t=AC.currentTime;
      KICK(t,m,.75); N(.06,.20,t+.055,m,3000); KICK(t+.10,m,.55); KICK(t+.18,m,.70);
      N(.08,.28,t+.22,m,2500); KICK(t+.26,m,.45);
      O(600,.40,'sawtooth',.45,t+.05,m,44); O(300,.40,'square',.18,t+.08,m,28);
      O(80,.50,'sine',.35,t+.15,m,30); N(.15,.18,t+.28,m,4000);
    }
    if (type==='join') {
      const m=mkBus(0.38), t=AC.currentTime;
      [440,554,659,880].forEach((f,i)=>{O(f,.13,'square',.30-i*.04,t+i*.065,m);O(f*2,.10,'sine',.08,t+i*.065,m);});
      KICK(t,m,.35);
    }
    if (type==='warn') {
      const m=mkBus(0.32), t=AC.currentTime;
      O(880,.07,'square',.45,t,m); O(660,.05,'triangle',.22,t+.04,m);
    }
    if (type==='win') {
      stopBg();
      const m=mkBus(0.48), t=AC.currentTime;
      for (let i=0;i<9;i++) { const dt=t+i*Math.max(.06,.11-i*.012); N(.055,.08+i*.018,dt,m,2500); }
      const re=t+0.72;
      N(.80,.55,re,m,5000); N(.60,.30,re,m,9000);
      KICK(re,m,.80); KICK(re+.08,m,.55);
      const ff=[440,554,659,880,1109,1319,1109,880,659,554,880,1319];
      ff.forEach((f,i)=>{const ft=re+.05+i*.115;O(f,.22,'sawtooth',.38,ft,m);O(f,.22,'square',.12,ft,m);O(f*2,.18,'sine',.06,ft,m);});
      const ct=re+.90;
      [110,138,165,220,277,330,440,554,659,880].forEach(f=>{O(f,1.4,'sine',.22,ct,m);O(f,1.4,'triangle',.08,ct,m);});
      KICK(ct,m,.85); KICK(ct+.1,m,.55); N(1.0,.60,ct,m,5000);
      const vm=[880,.14,988,.14,1109,.14,1319,.28,1109,.14,988,.14,1319,.56];
      let vt=ct+.12;
      for (let i=0;i<vm.length;i+=2){O(vm[i],vm[i+1]*.88,'square',.32,vt,m);O(vm[i]*2,vm[i+1]*.80,'sine',.10,vt,m);KICK(vt,m,.22);vt+=vm[i+1];}
      setTimeout(()=>{ if(audioReady) startBgMusic(); }, 3800);
    }
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════════
   VISUAL FX — PERF: particle limit
═══════════════════════════════════════════════════════ */
let _ptCount = 0;

function voteBurst(f) {
  const b = document.createElement('div');
  b.className   = 'vburst';
  b.textContent = '+1';
  b.style.left  = f.x+'px';
  b.style.top   = f.y+'px';
  DOM.arenaWrap.appendChild(b);
  setTimeout(()=>b.remove(), 780);
}

function spawnPts(el) {
  // PERF: max particle cheklovi
  if (_ptCount >= MAX_PARTICLES || !el) return;
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const cols=['#FF2D78','#FFD700','#FF6B00','#C080FF','#00FF88'];
  const count = Math.min(16, MAX_PARTICLES - _ptCount);
  for (let i=0;i<count;i++) {
    _ptCount++;
    const p=document.createElement('div');
    p.className='pt';
    const a=(i/count)*Math.PI*2, d=45+Math.random()*50;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:6px;height:6px;background:${cols[i%5]}`;
    p.style.setProperty('--dx',`${Math.cos(a)*d}px`);
    p.style.setProperty('--dy',`${Math.sin(a)*d}px`);
    document.body.appendChild(p);
    setTimeout(()=>{ p.remove(); _ptCount--; }, 620);
  }
}

function spawnConfetti() {
  DOM.cf.innerHTML='';
  const cols=['#FFD700','#FF6B00','#FF2D78','#C080FF','#00FF88','#00CFFF','#fff'];
  for (let i=0;i<90;i++) {
    const p=document.createElement('div');
    p.className='cfp';
    p.style.left=`${Math.random()*100}%`;
    p.style.background=cols[i%cols.length];
    p.style.borderRadius=Math.random()>.5?'50%':'3px';
    p.style.width=`${4+Math.random()*9}px`;
    p.style.height=`${4+Math.random()*9}px`;
    p.style.animationDuration=`${2+Math.random()*3}s`;
    p.style.animationDelay=`${Math.random()*2}s`;
    DOM.cf.appendChild(p);
  }
}

/* ═══════════════════════════════════════════════════════
   TOAST & MILESTONE
═══════════════════════════════════════════════════════ */
let _toastT=null;
function toast(msg) {
  DOM.toast.textContent=msg;
  DOM.toast.classList.add('on');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>DOM.toast.classList.remove('on'), 2200);
}

let _msT=null;
function checkMs() {
  if (_msIdx>=MS_LVLS.length) return;
  if (_totalVotes>=MS_LVLS[_msIdx]) {
    DOM.ms.textContent=`🎉 ${MS_LVLS[_msIdx]} votes — INCREDIBLE!`;
    DOM.ms.classList.add('on');
    sfx('join');
    clearTimeout(_msT);
    _msT=setTimeout(()=>DOM.ms.classList.remove('on'), 3500);
    _msIdx++;
  }
}

window.addEventListener('load', () => {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    initDOMCache();
    initGame();
    connectSocket();
  }));
});

document.getElementById('sound-badge').addEventListener('click', ()=>{ initAudio(); }, { once: true });
['click','touchstart'].forEach(ev => document.addEventListener(ev, ()=>{ if(!audioReady) initAudio(); }, { once: true }));

window.addEventListener('resize', () => {
  sizeArena();
  fighters.forEach(f => {
    const dx=f.x-CX, dy=f.y-CY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if (dist > aR-BALL_R) {
      const ang=Math.atan2(dy,dx);
      f.x=CX+Math.cos(ang)*(aR-BALL_R-4);
      f.y=CY+Math.sin(ang)*(aR-BALL_R-4);
    }
  });
});
